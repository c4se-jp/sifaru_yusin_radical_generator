---
name: test

"on":
  pull_request:

jobs:
  test:
    name: "Test"
    permissions: {}
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: npm
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run -w sifaru_yusin build:tsc && npm run lint

      - name: Test
        run: npm run test
